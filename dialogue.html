<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>图片对话</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  h2 { margin-bottom: 16px; font-weight: 500; color: #7986cb; }
  .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 14px; }

  #drop-zone {
    border: 2px dashed #7986cb; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: background .2s;
    background: #16213e;
  }
  #drop-zone:hover, #drop-zone.dragover { background: #1f3460; border-color: #9fa8da; }
  #drop-zone p { color: #9fa8da; font-size: 14px; line-height: 1.6; }
  #drop-zone .hint { font-size: 12px; color: #5c6bc0; margin-top: 8px; }

  #preview-container { display: none; flex-direction: column; gap: 10px; }
  #preview-container.show { display: flex; }
  #preview { max-width: 100%; max-height: 400px; border-radius: 8px; border: 1px solid #333; }
  #caption { background: #16213e; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; padding: 10px; font-size: 14px; width: 100%; resize: vertical; min-height: 60px; }
  #caption::placeholder { color: #666; }

  #send-btn {
    background: #7986cb; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 15px; cursor: pointer; width: 100%; transition: background .2s;
  }
  #send-btn:hover { background: #5c6bc0; }
  #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

  #status { font-size: 13px; color: #9fa8da; text-align: center; min-height: 20px; }
  #status.error { color: #ef5350; }
  #status.ok { color: #66bb6a; }

  input[type="file"] { display: none; }
</style>
</head>
<body>
<h2>图片对话</h2>
<div class="container">
  <div id="drop-zone">
    <p>点击这里上传图片<br>或将图片拖拽到此处</p>
    <p class="hint">也支持直接 Ctrl+V / Cmd+V 粘贴截图</p>
  </div>
  <input type="file" id="file-input" accept="image/*">

  <div id="preview-container">
    <img id="preview" src="" alt="预览">
    <textarea id="caption" placeholder="可选：加上文字说明..."></textarea>
    <button id="send-btn">发送到 Telegram</button>
  </div>

  <div id="status"></div>
</div>

<script>
const BOT_TOKEN = '8762770717:AAHvjsm02-eFJcJzFn_Zx70rosg6KTS9Pow';
const CHAT_ID = '8503627512';

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const previewContainer = document.getElementById('preview-container');
const preview = document.getElementById('preview');
const caption = document.getElementById('caption');
const sendBtn = document.getElementById('send-btn');
const status = document.getElementById('status');

let imageBase64 = '';

function setStatus(msg, type = '') {
  status.className = type;
  status.textContent = msg;
}

function processFile(file) {
  if (!file || !file.type.startsWith('image/')) {
    setStatus('请选择图片文件', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result;
    preview.src = imageBase64;
    previewContainer.classList.add('show');
    setStatus('');
  };
  reader.readAsDataURL(file);
}

// drag & drop
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('dragover');
  if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) processFile(e.target.files[0]); });

// paste
document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      processFile(item.getAsFile());
      break;
    }
  }
});

async function sendToTelegram() {
  if (!imageBase64) {
    setStatus('请先上传图片', 'error');
    return;
  }
  sendBtn.disabled = true;
  setStatus('发送中...');

  const base64Data = imageBase64.split(',')[1];
  const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;

  const formData = new FormData();
  formData.append('chat_id', CHAT_ID);
  formData.append('photo', `data:image/jpeg;base64,${base64Data}`);
  if (caption.value.trim()) formData.append('caption', caption.value.trim());

  try {
    const resp = await fetch(url, { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.ok) {
      setStatus('发送成功 ✓', 'ok');
    } else {
      setStatus('发送失败: ' + (data.description || '未知错误'), 'error');
    }
  } catch (err) {
    setStatus('网络错误: ' + err.message, 'error');
  } finally {
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', sendToTelegram);
</script>
</body>
</html>
