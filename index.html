<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="百日闯 - 初二学习打卡PWA">
  <title>百日闯 - 初二学习打卡</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- ===== HEADER ===== -->
    <header>
      <div class="header-left">
        <h1>百日闯</h1>
        <span class="subtitle">初二</span>
      </div>
      <div class="header-right">
        <button class="header-settings-btn" id="header-settings-btn">⚙️</button>
      </div>
    </header>

    <main>
      <!-- ===== HOME VIEW ===== -->
      <section id="home-view" class="view active">
        <!-- Streak Banner + 100-day Progress -->
        <div class="home-top-row">
          <div class="streak-info">
            <div class="streak-main">
              <span class="streak-count" id="streak-count">0</span>
              <span class="streak-unit">天连续</span>
            </div>
            <div class="streak-sub" id="streak-sub">开始你的百日计划</div>
          </div>
          <div class="hundred-day-card">
            <div class="hundred-day-header">
              <span class="hundred-day-label">百日计划</span>
              <span class="hundred-day-count" id="hundred-checked">0<span class="hundred-day-total">/100</span></span>
            </div>
            <div class="hundred-bar">
              <div class="hundred-bar-fill" id="hundred-bar-fill" style="width:0%"></div>
              <div class="hundred-bar-today-marker" id="hundred-today-marker" style="left:0%"></div>
            </div>
            <div class="hundred-day-dots" id="hundred-day-dots"></div>
          </div>
        </div>

        <!-- Today Stats Row -->
        <div class="today-stats-row">
          <div class="mini-stat">
            <span id="today-checkin-dot" class="checkin-dot unchecked">○</span>
            <span id="today-checkin-text">未打卡</span>
          </div>
          <div class="stat-divider"></div>
          <div class="mini-stat">
            <span class="mini-num" id="today-practice-count">0</span>
            <span class="mini-label">已练</span>
          </div>
          <div class="stat-divider"></div>
          <div class="mini-stat">
            <span class="mini-num" id="today-accuracy">--%</span>
            <span class="mini-label">正确率</span>
          </div>
        </div>

        <!-- Daily Goal -->
        <div class="goal-compact" id="goal-compact">
          <div class="goal-meta">
            <span class="goal-label">今日目标</span>
            <span class="goal-nums" id="goal-progress-text">0/10</span>
          </div>
          <div class="goal-bar">
            <div class="goal-fill" id="goal-fill" style="width:0%"></div>
          </div>
        </div>

        <!-- Mastery Chart -->
        <div class="home-chart-area" id="home-chart-area">
          <div class="home-chart-header">
            <span class="home-chart-title">各科掌握趋势</span>
            <span class="home-chart-hint" id="home-chart-hint">开始练习后显示</span>
          </div>
          <canvas id="home-mastery-canvas"></canvas>
          <div class="home-chart-legend" id="home-chart-legend"></div>
        </div>

        <!-- Quick Actions -->
        <div class="home-actions">
          <button class="home-action-btn primary" id="checkin-btn">
            <span>📅</span> 今日打卡
          </button>
          <button class="home-action-btn" data-route="#/practice">
            <span>✏️</span> 开始练习
          </button>
        </div>

        <!-- Bottom Menu -->
        <div class="home-menu">
          <button class="home-menu-btn" data-route="#/wrong">
            📕 错题集 <span class="badge" id="wrong-badge" style="display:none">0</span>
          </button>
          <button class="home-menu-btn" data-route="#/progress">
            📊 记录
          </button>
          <button class="home-menu-btn" id="feedback-btn">
            💬 反馈
          </button>
        </div>
      </section>

      <!-- ===== PRACTICE VIEW ===== -->
      <section id="practice-view" class="view">
        <div class="view-toolbar">
          <button class="back-home-btn" data-route="#/index">← 返回</button>
          <span class="view-title">选择科目</span>
        </div>
        <div class="subjects-grid" id="subjects-grid">
          <button class="subject-grid-btn active" data-subject="math">数学</button>
          <button class="subject-grid-btn" data-subject="english">英语</button>
          <button class="subject-grid-btn" data-subject="chinese">语文</button>
          <button class="subject-grid-btn" data-subject="science">科学</button>
          <button class="subject-grid-btn" data-subject="biology">生物</button>
          <button class="subject-grid-btn" data-subject="history">历史</button>
          <button class="subject-grid-btn" data-subject="geography">地理</button>
          <button class="subject-grid-btn" data-subject="politics">道法</button>
        </div>
        <div class="difficulty-row">
          <button class="diff-btn active" data-difficulty="">全部</button>
          <button class="diff-btn" data-difficulty="1">简单</button>
          <button class="diff-btn" data-difficulty="2">中等</button>
          <button class="diff-btn" data-difficulty="3">困难</button>
        </div>
        <div id="question-container">
          <p class="placeholder">选择科目开始练习</p>
        </div>
      </section>

      <!-- ===== PROGRESS VIEW ===== -->
      <section id="progress-view" class="view">
        <div class="view-toolbar">
          <button class="back-home-btn" data-route="#/index">← 返回</button>
          <span class="view-title">打卡记录</span>
        </div>
        <div id="history-container">
          <p class="placeholder">暂无打卡记录</p>
        </div>
      </section>

      <!-- ===== WRONG VIEW ===== -->
      <section id="wrong-view" class="view">
        <div class="view-toolbar">
          <button class="back-home-btn" data-route="#/index">← 返回</button>
          <span class="view-title">错题集</span>
        </div>
        <div id="wrong-container">
          <p class="placeholder">加载中...</p>
        </div>
      </section>

      <!-- ===== MASTERY VIEW ===== -->
      <section id="mastery-view" class="view">
        <div class="view-toolbar">
          <button class="back-home-btn" data-route="#/index">← 返回</button>
          <span class="view-title">知识掌握</span>
        </div>
        <div class="mastery-subject-tabs">
          <button class="tab-btn active" data-subject="math">数学</button>
          <button class="tab-btn" data-subject="english">英语</button>
          <button class="tab-btn" data-subject="chinese">语文</button>
          <button class="tab-btn" data-subject="science">科学</button>
          <button class="tab-btn" data-subject="biology">生物</button>
          <button class="tab-btn" data-subject="history">历史</button>
          <button class="tab-btn" data-subject="geography">地理</button>
          <button class="tab-btn" data-subject="politics">道法</button>
        </div>
        <div class="mastery-type-tabs">
          <button class="type-tab active" data-type="tag">按考点</button>
          <button class="type-tab" data-type="type">按题型</button>
        </div>
        <div id="mastery-content">
          <p class="placeholder">加载中...</p>
        </div>
      </section>

      <!-- ===== SETTINGS VIEW ===== -->
      <section id="settings-view" class="view">
        <div class="view-toolbar">
          <button class="back-home-btn" data-route="#/index">← 返回</button>
          <span class="view-title">设置</span>
        </div>
        <div id="settings-content">
          <p class="placeholder">加载中...</p>
        </div>
      </section>
    </main>

    <footer>
      <p>百日闯 · 初二学习打卡</p>
    </footer>
  </div>

  <!-- ===== FLOATING MODALS ===== -->
  <div id="pwa-install-banner" class="float-card" style="display:none;top:12px">
    <span>安装百日闯到桌面</span>
    <button class="pwa-install-btn" id="pwa-install-btn">安装</button>
    <button class="float-close" onclick="dismissPwaBanner()">×</button>
  </div>

  <div id="checkin-modal" class="modal-overlay" style="display:none">
    <div class="modal-card float-card" style="top:20px">
      <div class="modal-emoji">🎉</div>
      <p class="modal-title">打卡成功！</p>
      <div class="checkin-stats">
        <div class="checkin-stat-item">
          <span class="checkin-stat-num" id="modal-streak">0</span>
          <span class="checkin-stat-label">连续天数</span>
        </div>
        <div class="checkin-stat-item">
          <span class="checkin-stat-num" id="modal-total">0</span>
          <span class="checkin-stat-label">累计打卡</span>
        </div>
        <div class="checkin-stat-item">
          <span class="checkin-stat-num" id="modal-week">0</span>
          <span class="checkin-stat-label">本周</span>
        </div>
      </div>
      <button class="primary-btn" id="checkin-modal-close" style="margin-top:16px">好的</button>
    </div>
  </div>

  <div id="toast" class="toast" style="display:none"></div>

  <div id="feedback-modal" class="modal-overlay" style="display:none">
    <div class="modal-card float-card" style="top:20px;max-width:380px">
      <button class="float-close" id="feedback-close" style="position:absolute;top:10px;right:12px;background:none;border:none;font-size:1.2rem;cursor:pointer;color:#999">×</button>
      <p class="modal-emoji">💬</p>
      <p class="modal-title">意见反馈</p>
      <p class="modal-desc">告诉我们哪里可以做得更好</p>
      <textarea id="feedback-text" class="feedback-textarea" placeholder="请输入你的想法..."></textarea>
      <div id="feedback-status" class="feedback-status"></div>
      <button class="primary-btn" id="feedback-submit">提交反馈</button>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@3.0.0/dist/idb-keyval-iife.min.js"></script>
  <script>
    window.get = window.idbKeyval.get;
    window.set = window.idbKeyval.set;
    window.del = window.idbKeyval.del;
    window.clear = window.idbKeyval.clear;
    window.keys = window.idbKeyval.keys;
  </script>
  <script src="js/checkin.js"></script>
  <script src="js/question_bank.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
