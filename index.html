<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="百日闯 - 初二学习打卡PWA">
  <title>百日闯 - 初二学习打卡</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ===== HEADER ===== -->
  <header>
    <div class="header-left">
      <h1>百日闯</h1>
      <span class="subtitle">初二</span>
    </div>
    <div class="header-right">
      <button class="header-btn" id="header-history-btn" data-action="nav" data-view="progress">📊</button>
      <button class="header-settings-btn" id="header-settings-btn" data-action="nav" data-view="settings">⚙️</button>
    </div>
  </header>

  <main>

    <!-- ===== HOME VIEW ===== -->
    <section id="view-home" class="view active">
      <div class="streak-card" data-action="nav" data-view="progress">
        <div class="streak-card-left">
          <div class="streak-main">
            <span class="streak-count" id="streak-count">0</span>
            <span class="streak-unit">天连续</span>
          </div>
          <div class="streak-sub" id="streak-sub">开始你的百日计划</div>
        </div>
        <div class="streak-hint">
          <span>查看折线图</span>
          <span class="streak-arrow">→</span>
        </div>
      </div>

      <div class="entry-cards" id="entry-cards">
        <div class="entry-card new" data-action="start-entry" data-entry="new">
          <div class="entry-card-icon">🆕</div>
          <div class="entry-card-body">
            <div class="entry-card-title">全新题目</div>
            <div class="entry-card-count" id="entry-new-count">0题</div>
          </div>
          <span class="entry-arrow">›</span>
        </div>
        <div class="entry-card weak" data-action="start-entry" data-entry="weak">
          <div class="entry-card-icon">🔴</div>
          <div class="entry-card-body">
            <div class="entry-card-title">易错汇总</div>
            <div class="entry-card-count empty" id="entry-weak-count">0题</div>
          </div>
          <span class="entry-arrow">›</span>
        </div>
        <div class="entry-card mastered" data-action="start-entry" data-entry="mastered">
          <div class="entry-card-icon">✅</div>
          <div class="entry-card-body">
            <div class="entry-card-title">熟练掌握</div>
            <div class="entry-card-count empty" id="entry-mastered-count">0题</div>
          </div>
          <span class="entry-arrow">›</span>
        </div>
      </div>
    </section>

    <!-- ===== PRACTICE VIEW ===== -->
    <section id="view-practice" class="view">
      <div class="view-toolbar">
        <button class="back-home-btn" data-action="nav" data-view="home">← 返回</button>
        <span class="view-title" id="practice-view-title">选择科目</span>
      </div>
      <div id="practice-entry-info" class="practice-entry-info" style="display:none">
        <span id="practice-entry-label"></span>
        <span id="practice-entry-count"></span>
      </div>
      <div class="subjects-grid" id="subjects-grid">
        <button class="subject-grid-btn" data-action="start-subject" data-subject="math">数学</button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="english">英语</button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="chinese">语文</button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="science">科学</button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="biology">生物</button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="history">历史</button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="geography">地理</button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="politics">道法</button>
      </div>
      <div id="question-container">
        <p class="placeholder">选择科目开始练习</p>
      </div>
    </section>

    <!-- ===== PROGRESS VIEW ===== -->
    <section id="view-progress" class="view">
      <div class="view-toolbar">
        <button class="back-home-btn" data-action="nav" data-view="home">← 返回</button>
        <span class="view-title">打卡记录</span>
      </div>
      <div id="history-container">
        <p class="placeholder">加载中...</p>
      </div>
    </section>

    <!-- ===== SETTINGS VIEW ===== -->
    <section id="view-settings" class="view">
      <div class="view-toolbar">
        <button class="back-home-btn" data-action="nav" data-view="home">← 返回</button>
        <span class="view-title">设置</span>
      </div>
      <div id="settings-content">
        <p class="placeholder">加载中...</p>
      </div>
    </section>

  </main>

  <footer>
    <p>百日闯 · 初二学习打卡</p>
  </footer>
</div>

<!-- ===== FLOATING MODALS ===== -->
<div id="pwa-install-banner" class="float-card" style="display:none;top:12px">
  <span>安装百日闯到桌面</span>
  <button class="pwa-install-btn" id="pwa-install-btn" data-action="install-pwa">安装</button>
  <button class="float-close" data-action="dismiss-pwa">×</button>
</div>

<div id="checkin-modal" class="modal-overlay" style="display:none">
  <div class="modal-card float-card" style="top:20px">
    <div class="modal-emoji">🎉</div>
    <p class="modal-title">打卡成功！</p>
    <div class="checkin-stats">
      <div class="checkin-stat-item">
        <span class="checkin-stat-num" id="modal-streak">0</span>
        <span class="checkin-stat-label">连续天数</span>
      </div>
      <div class="checkin-stat-item">
        <span class="checkin-stat-num" id="modal-total">0</span>
        <span class="checkin-stat-label">累计打卡</span>
      </div>
      <div class="checkin-stat-item">
        <span class="checkin-stat-num" id="modal-week">0</span>
        <span class="checkin-stat-label">本周</span>
      </div>
    </div>
    <button class="primary-btn" data-action="close-checkin-modal" style="margin-top:16px">好的</button>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<!-- ===== SCRIPTS ===== -->
<script src="https://cdn.jsdelivr.net/npm/idb-keyval@3.0.0/dist/idb-keyval-iife.min.js"></script>
<script>
  window.get = window.idbKeyval.get;
  window.set = window.idbKeyval.set;
  window.del = window.idbKeyval.del;
  window.clear = window.idbKeyval.clear;
  window.keys = window.idbKeyval.keys;
</script>
<script src="app.js"></script>
</body>
</html>
