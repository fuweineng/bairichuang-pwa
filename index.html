<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="百日闯 - 初二学习打卡PWA">
  <title>百日闯 - 初二学习打卡</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ===== UPDATE BANNER ===== -->
  <div id="update-banner" class="update-banner" style="display:none">
    <span class="update-text">发现新版本，立即更新</span>
    <button class="update-btn primary-btn">更新</button>
  </div>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="header-left">
      <h1 class="app-title-wrap">
        <span id="app-title">百日闯</span>
        <span class="update-badge" id="update-badge" data-action="upgrade-questions" style="display:none">有新版本</span>
      </h1>
      <span class="subtitle">初二</span>
    </div>
    <div class="header-right">
      <button class="header-btn" id="header-history-btn" data-action="nav" data-view="progress">📊</button>
      <button class="header-settings-btn" id="header-settings-btn" data-action="nav" data-view="settings">⚙️</button>
    </div>
  </header>

  <main>

    <!-- ===== HOME VIEW ===== -->
    <section id="view-home" class="view active">

      <!-- 折线图：最近30天得分趋势（放最上面） -->
      <div class="home-chart-section">
        <div class="chart-header">
          <span class="chart-title">📈 学习趋势（近30天）</span>
          <span class="chart-hint" id="chart-hint">得分率 = 做对题数 ÷ 当天总题数 × 100%</span>
        </div>
        <div class="chart-wrapper" id="home-chart-container"></div>
        <div class="chart-subject-bar" id="chart-subject-bar">
          <button class="subj-btn active" data-chart-subj="all">全科</button>
          <button class="subj-btn" data-chart-subj="chinese">语</button>
          <button class="subj-btn" data-chart-subj="math">数</button>
          <button class="subj-btn" data-chart-subj="english">英</button>
          <button class="subj-btn" data-chart-subj="science">科学</button>
          <button class="subj-btn" data-chart-subj="biology">生</button>
          <button class="subj-btn" data-chart-subj="history">历史</button>
          <button class="subj-btn" data-chart-subj="geography">地理</button>
          <button class="subj-btn" data-chart-subj="politics">道法</button>
        </div>
      </div>

      <!-- 连续打卡 + 三个入口卡片 -->
      <div class="streak-card" data-action="nav" data-view="progress">
        <div class="streak-card-left">
          <div class="streak-main">
            <span class="streak-count" id="streak-count">0</span>
            <span class="streak-unit">天连续</span>
          </div>
          <div class="streak-sub" id="streak-sub">开始你的百日计划</div>
        </div>
        <div class="streak-hint">
          <span>查看详情</span>
          <span class="streak-arrow">→</span>
        </div>
      </div>

      <div class="entry-cards" id="entry-cards">
        <div class="entry-card new" data-action="start-entry" data-entry="new">
          <div class="entry-card-icon">🆕</div>
          <div class="entry-card-body">
            <div class="entry-card-title">全新题目</div>
            <div class="entry-card-count" id="entry-new-count">0题</div>
          </div>
          <span class="entry-arrow">›</span>
        </div>
        <div class="entry-card weak" data-action="start-entry" data-entry="weak">
          <div class="entry-card-icon">🔴</div>
          <div class="entry-card-body">
            <div class="entry-card-title">易错汇总</div>
            <div class="entry-card-count empty" id="entry-weak-count">0题</div>
          </div>
          <span class="entry-arrow">›</span>
        </div>
        <div class="entry-card mastered" data-action="start-entry" data-entry="mastered">
          <div class="entry-card-icon">✅</div>
          <div class="entry-card-body">
            <div class="entry-card-title">熟练掌握</div>
            <div class="entry-card-count empty" id="entry-mastered-count">0题</div>
          </div>
          <span class="entry-arrow">›</span>
        </div>
      </div>
    </section>

    <!-- ===== PRACTICE VIEW ===== -->
    <section id="view-practice" class="view">
      <div class="view-toolbar">
        <button class="back-home-btn" data-action="nav" data-view="home">← 返回</button>
        <span class="view-title" id="practice-view-title">选择科目</span>
      </div>
      <div id="practice-entry-info" class="practice-entry-info" style="display:none">
        <span id="practice-entry-label"></span>
        <span id="practice-entry-count"></span>
      </div>
      <div class="subjects-grid" id="subjects-grid">
        <button class="subject-grid-btn" data-action="start-subject" data-subject="math">
          <span class="subj-name">数学</span>
          <span class="subj-badge" id="badge-math"></span>
        </button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="english">
          <span class="subj-name">英语</span>
          <span class="subj-badge" id="badge-english"></span>
        </button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="chinese">
          <span class="subj-name">语文</span>
          <span class="subj-badge" id="badge-chinese"></span>
        </button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="science">
          <span class="subj-name">科学</span>
          <span class="subj-badge" id="badge-science"></span>
        </button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="biology">
          <span class="subj-name">生物</span>
          <span class="subj-badge" id="badge-biology"></span>
        </button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="history">
          <span class="subj-name">历史</span>
          <span class="subj-badge" id="badge-history"></span>
        </button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="geography">
          <span class="subj-name">地理</span>
          <span class="subj-badge" id="badge-geography"></span>
        </button>
        <button class="subject-grid-btn" data-action="start-subject" data-subject="politics">
          <span class="subj-name">道法</span>
          <span class="subj-badge" id="badge-politics"></span>
        </button>
      </div>
      <div id="question-container">
        <p class="placeholder">选择科目开始练习</p>
      </div>
    </section>

    <!-- ===== PROGRESS VIEW ===== -->
    <section id="view-progress" class="view">
      <div class="view-toolbar">
        <button class="back-home-btn" data-action="nav" data-view="home">← 返回</button>
        <span class="view-title">打卡记录</span>
      </div>
      <div id="history-container">
        <p class="placeholder">加载中...</p>
      </div>
    </section>

    <!-- ===== SETTINGS VIEW ===== -->
    <section id="view-settings" class="view">
      <div class="view-toolbar">
        <button class="back-home-btn" data-action="nav" data-view="home">← 返回</button>
        <span class="view-title">设置</span>
      </div>
      <div id="settings-content">
        <p class="placeholder">加载中...</p>
      </div>
    </section>

  </main>

  <footer>
    <p>百日闯 · 初二学习打卡</p>
  </footer>
</div>

<!-- ===== FLOATING MODALS ===== -->
<div id="pwa-install-banner" class="float-card" style="display:none;top:12px">
  <span>安装百日闯到桌面</span>
  <button class="pwa-install-btn" id="pwa-install-btn" data-action="install-pwa">安装</button>
  <button class="float-close" data-action="dismiss-pwa">×</button>
</div>

<div id="checkin-modal" class="modal-overlay" style="display:none">
  <div class="modal-card float-card" style="top:20px">
    <div class="modal-emoji">🎉</div>
    <p class="modal-title">打卡成功！</p>
    <div class="checkin-stats">
      <div class="checkin-stat-item">
        <span class="checkin-stat-num" id="modal-streak">0</span>
        <span class="checkin-stat-label">连续天数</span>
      </div>
      <div class="checkin-stat-item">
        <span class="checkin-stat-num" id="modal-total">0</span>
        <span class="checkin-stat-label">累计打卡</span>
      </div>
      <div class="checkin-stat-item">
        <span class="checkin-stat-num" id="modal-week">0</span>
        <span class="checkin-stat-label">本周</span>
      </div>
    </div>
    <button class="primary-btn" data-action="close-checkin-modal" style="margin-top:16px">好的</button>
  </div>
</div>

<div id="toast" class="toast" style="display:none"></div>

<!-- ===== SCRIPTS ===== -->
<script type="module" src="app.js"></script>
</body>
</html>
