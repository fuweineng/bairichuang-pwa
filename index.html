<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4CAF50">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="description" content="百日闯 - 初二学习打卡PWA">
  <title>百日闯 - 初二学习打卡</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>百日闯</h1>
      <p class="subtitle">初二学习打卡</p>
    </header>

    <main>
      <section id="home-view" class="view active">
        <div class="streak-info">
          <span class="streak-label">连续打卡</span>
          <span class="streak-count" id="streak-count">0</span>
          <span class="streak-unit">天</span>
        </div>
        <div class="today-stats">
          <div class="stat-cell">
            <span class="stat-icon" id="today-checkin-icon">○</span>
            <span class="stat-text" id="today-checkin-text">未打卡</span>
          </div>
          <div class="stat-cell">
            <span class="stat-num" id="today-practice-count">0</span>
            <span class="stat-text">今日已练</span>
          </div>
          <div class="stat-cell">
            <span class="stat-num" id="today-accuracy">--%</span>
            <span class="stat-text">正确率</span>
          </div>
        </div>
        <div class="daily-goal">
          <div class="goal-header">
            <span>今日目标</span>
            <span id="goal-progress-text">0/10</span>
          </div>
          <div class="goal-bar">
            <div class="goal-fill" id="goal-fill" style="width:0%"></div>
          </div>
        </div>
        <button id="checkin-btn" class="primary-btn">今日打卡</button>
        <div class="menu">
          <button class="menu-btn" data-route="#/practice">开始练习</button>
          <button class="menu-btn" data-route="#/wrong">
            错题集
            <span class="badge" id="wrong-badge" style="display:none">0</span>
          </button>
          <button class="menu-btn" data-route="#/mastery">知识掌握</button>
          <button class="menu-btn" data-route="#/progress">查看进度</button>
          <button class="menu-btn" data-route="#/settings">⚙️ 设置</button>
        </div>
      </section>

      <section id="practice-view" class="view">
        <h2>练习模式</h2>
        <div class="subjects">
          <button class="subject-btn" data-subject="math">数学</button>
          <button class="subject-btn" data-subject="english">英语</button>
          <button class="subject-btn" data-subject="chinese">语文</button>
          <button class="subject-btn" data-subject="science">科学</button>
          <button class="subject-btn" data-subject="history">历史</button>
          <button class="subject-btn" data-subject="geography">地理</button>
          <button class="subject-btn" data-subject="politics">道法</button>
        </div>
        <div id="question-container">
          <p class="placeholder">选择科目开始练习</p>
        </div>
      </section>

      <section id="progress-view" class="view">
        <h2>学习进度</h2>
        <div id="history-container">
          <p class="placeholder">暂无打卡记录</p>
        </div>
        <button class="back-btn" data-route="#/index">返回</button>
      </section>

      <section id="wrong-view" class="view">
        <h2>错题集</h2>
        <div id="wrong-container">
          <p class="placeholder">加载中...</p>
        </div>
        <button class="back-btn" data-route="#/index">返回</button>
      </section>

      <section id="mastery-view" class="view">
        <h2>知识掌握</h2>
        <div class="mastery-subject-tabs">
          <button class="tab-btn active" data-subject="math">数学</button>
          <button class="tab-btn" data-subject="english">英语</button>
          <button class="tab-btn" data-subject="chinese">语文</button>
          <button class="tab-btn" data-subject="science">科学</button>
          <button class="tab-btn" data-subject="history">历史</button>
          <button class="tab-btn" data-subject="geography">地理</button>
          <button class="tab-btn" data-subject="politics">道法</button>
        </div>
        <div class="mastery-type-tabs">
          <button class="type-tab active" data-type="tag">按考点</button>
          <button class="type-tab" data-type="type">按题型</button>
        </div>
        <div id="mastery-content">
          <p class="placeholder">加载中...</p>
        </div>
        <button class="back-btn" data-route="#/index">返回</button>
      </section>

      <section id="settings-view" class="view">
        <h2>设置</h2>
        <div id="settings-content">
          <p class="placeholder">加载中...</p>
        </div>
        <button class="back-btn" data-route="#/index">返回</button>
      </section>

      <div id="pwa-install-banner" style="display:none">
        <span>安装百日闯到桌面，更方便学习</span>
        <button id="pwa-install-btn">安装</button>
        <button class="close-btn" onclick="dismissPwaBanner()">×</button>
      </div>
    </main>

    <footer>
      <p>本项目由 Hermes Agent 生成</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/idb-keyval@3.0.0/dist/idb-keyval-iife.min.js"></script>
  <script>
    // Expose idb-keyval globals for non-module scripts
    window.get = window.idbKeyval.get;
    window.set = window.idbKeyval.set;
    window.del = window.idbKeyval.del;
    window.clear = window.idbKeyval.clear;
    window.keys = window.idbKeyval.keys;
  </script>
  <script src="js/checkin.js"></script>
  <script src="js/question_bank.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
<!-- 本项目由 Hermes Agent 生成 | 技术方案: ~/projects/bairichuang-pwa/README.md -->
</html>
